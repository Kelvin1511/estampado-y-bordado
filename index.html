<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOOM | Embroidery & Prints</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>BLOOM</h1>
        <p>Handmade with Love & Custom Prints</p>
    </header>

    <main class="gallery">
        <div class="card" onclick="openModal('img/photo1.jpg', 'Embroidery Design 1', 'Detailed stitch work using premium cotton threads.')">
            <img src="img/photo1.jpg" alt="BLOOM Design 1">
            <h3>Product 1</h3>
            <p>Click to see details</p>
        </div>

        <div class="card" onclick="openModal('img/photo2.jpg', 'Custom Print 1', 'High-durability screen printing on soft fabric.')">
            <img src="img/photo2.jpg" alt="BLOOM Design 2">
            <h3>Product 2</h3>
            <p>Click to see details</p>
        </div>

        <div class="card" onclick="openModal('img/photo3.jpg', 'Embroidery Design 2', 'Handcrafted pattern with elegant textures and finishes.')">
            <img src="img/photo3.jpg" alt="BLOOM Design 3">
            <h3>Product 3</h3>
            <p>Click to see details</p>
        </div>

        <div class="card" onclick="openModal('img/photo4.jpg', 'Custom Print 2', 'Premium custom stamp design with vibrant colors.')">
            <img src="img/photo4.jpg" alt="BLOOM Design 4">
            <h3>Product 4</h3>
            <p>Click to see details</p>
        </div>
    </main>

    <div id="detailModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img id="modalImg" src="" alt="Detail View">
            <div class="modal-text">
                <h2 id="modalTitle"></h2>
                <p id="modalDesc"></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
